name: Actualizar Catalogo Diario

on:
  schedule:
    - cron: '0 12 * * *' # Corre todos los dias a las 12:00 UTC (09:00 AM Argentina)
  workflow_dispatch: # Permite correrlo manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run scraper
      run: python build_catalog.py

    - name: Commit and push if changed
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        git add index.html products_db.json
        # Only commit if there are changes
        git diff --quiet && git diff --staged --quiet || git commit -m "Actualizacion diaria de stock y precios"
        git push
